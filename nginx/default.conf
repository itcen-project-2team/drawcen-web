    }server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /ws/ {
        proxy_pass http://10.0.2.179:8080;              # 웹소켓 요청을 백엔드 서버(WAS)로 전달
        proxy_http_version 1.1;                         # 웹소켓은 HTTP/1.1 이상에서만 동작
        proxy_set_header Upgrade $http_upgrade;         # 웹소켓 프로토콜 업그레이드 요청 허용
        proxy_set_header Connection "upgrade";          # 연결 업그레이드 지정
        proxy_set_header Host $host;                    # 원 요청의 Host 헤더를 그대로 전달
        proxy_read_timeout 3600;                        # 클라이언트 → 서버 읽기 타임아웃 (1시간)
        proxy_send_timeout 3600;                        # 서버 → 클라이언트 전송 타임아웃 (1시간)
    }

    location /api/ {
        proxy_pass http://10.0.2.179:8080;              # API 요청을 동일한 백엔드로 전달
        proxy_set_header Host $host;                    # Host 헤더 유지
        proxy_http_version 1.1;                         # 필요 시 연결 재사용을 위한 HTTP/1.1 명시
    }
}


